AWSTemplateFormatVersion: "2010-09-09"
Description: Antrocare Enterprises free-tier-conscious AWS deployment with VPC, EC2, ALB, RDS PostgreSQL, API Gateway, SSM, and CloudWatch logs.

Parameters:
  ProjectName:
    Type: String
    Default: antrocare
    AllowedPattern: "[a-z][a-z0-9-]{2,24}"
  EnvironmentName:
    Type: String
    Default: prod
    AllowedPattern: "[a-z][a-z0-9-]{1,16}"
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  AppArtifactBucket:
    Type: String
  AppArtifactKey:
    Type: String
  DbName:
    Type: String
    Default: antrocare
    AllowedPattern: "[a-zA-Z][a-zA-Z0-9_]{1,63}"
  DbUsername:
    Type: String
    Default: antrocare_admin
    NoEcho: true
    AllowedPattern: "[a-zA-Z][a-zA-Z0-9_]{1,15}"
  DbPasswordParameterName:
    Type: String
    NoEcho: true
  AdminKeyParameterName:
    Type: String
    NoEcho: true
  AdminEmail:
    Type: String
    Default: sandeepkumar.parangi@gmail.com
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
  AppPort:
    Type: Number
    Default: 8081

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-igw"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.0.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-public-a"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.1.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-public-b"

  PrivateDbSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.10.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-private-db-a"

  PrivateDbSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.11.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-private-db-b"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-public-rt"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP access to Antrocare ALB
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-alb-sg"

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Antrocare app access from ALB only
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-app-sg"

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PostgreSQL access from Antrocare app only
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-db-sg"

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub "/antrocare/${ProjectName}/${EnvironmentName}/app"
      RetentionInDays: 14

  AlertEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref AdminEmail

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for Antrocare PostgreSQL
      SubnetIds:
        - !Ref PrivateDbSubnetA
        - !Ref PrivateDbSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-db-subnets"

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-${EnvironmentName}-postgres-v2"
      DBName: !Ref DbName
      Engine: postgres
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp2
      StorageEncrypted: true
      MasterUsername: !Ref DbUsername
      MasterUserPassword: !Sub "{{resolve:ssm-secure:${DbPasswordParameterName}}}"
      MultiAZ: false
      PubliclyAccessible: false
      AutoMinorVersionUpgrade: true
      BackupRetentionPeriod: 7
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-postgres"

  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${EnvironmentName}-ec2-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: !Sub "${ProjectName}-${EnvironmentName}-app-bootstrap"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:${AWS::Partition}:s3:::${AppArtifactBucket}/${AppArtifactKey}"
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DbPasswordParameterName}"
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AdminKeyParameterName}"
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectName}-${EnvironmentName}-ec2-profile"
      Roles:
        - !Ref Ec2Role

  AppInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - Database
      - AppLogGroup
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT20M
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
            Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-app"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y aws-cfn-bootstrap amazon-cloudwatch-agent java-17-amazon-corretto-headless

          mkdir -p /opt/antrocare /var/log/antrocare
          aws s3 cp "s3://${AppArtifactBucket}/${AppArtifactKey}" /opt/antrocare/antrocare.jar --region "${AWS::Region}"

          DB_PASSWORD="$(aws ssm get-parameter --region "${AWS::Region}" --name "${DbPasswordParameterName}" --with-decryption --query Parameter.Value --output text)"
          ADMIN_KEY="$(aws ssm get-parameter --region "${AWS::Region}" --name "${AdminKeyParameterName}" --with-decryption --query Parameter.Value --output text)"

          cat > /etc/antrocare.env <<ENVEOF
          SPRING_PROFILES_ACTIVE=aws
          PORT=${AppPort}
          DATABASE_URL=jdbc:postgresql://${Database.Endpoint.Address}:${Database.Endpoint.Port}/${DbName}
          DATABASE_USERNAME=${DbUsername}
          DATABASE_PASSWORD=$DB_PASSWORD
          ANTROCARE_ADMIN_KEY=$ADMIN_KEY
          ANTROCARE_ADMIN_EMAIL=${AdminEmail}
          ANTROCARE_LOW_STOCK_THRESHOLD=5
          ANTROCARE_MAIL_ALERTS_ENABLED=false
          ANTROCARE_SES_ALERTS_ENABLED=true
          AWS_REGION=${AWS::Region}
          JAVA_OPTS=-XX:MaxRAMPercentage=70 -Djava.security.egd=file:/dev/./urandom
          STATIC_CACHE_PERIOD=86400
          ENVEOF
          chmod 600 /etc/antrocare.env

          cat > /etc/systemd/system/antrocare.service <<'SERVICEEOF'
          [Unit]
          Description=Antrocare Enterprises catalog application
          After=network-online.target
          Wants=network-online.target

          [Service]
          User=ec2-user
          WorkingDirectory=/opt/antrocare
          EnvironmentFile=/etc/antrocare.env
          ExecStart=/bin/sh -c 'exec /usr/bin/java $JAVA_OPTS -jar /opt/antrocare/antrocare.jar'
          Restart=always
          RestartSec=10
          SuccessExitStatus=143
          StandardOutput=append:/var/log/antrocare/app.log
          StandardError=append:/var/log/antrocare/app.log

          [Install]
          WantedBy=multi-user.target
          SERVICEEOF

          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<CWEOF
          {
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/antrocare/app.log",
                      "log_group_name": "${AppLogGroup}",
                      "log_stream_name": "{instance_id}/app",
                      "timezone": "UTC"
                    }
                  ]
                }
              }
            }
          }
          CWEOF

          chown -R ec2-user:ec2-user /opt/antrocare /var/log/antrocare
          systemctl daemon-reload
          systemctl enable --now antrocare
          systemctl enable --now amazon-cloudwatch-agent
          /opt/aws/bin/cfn-signal --success true --stack "${AWS::StackName}" --resource AppInstance --region "${AWS::Region}"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-${EnvironmentName}-tg"
      VpcId: !Ref Vpc
      Protocol: HTTP
      Port: !Ref AppPort
      TargetType: instance
      Targets:
        - Id: !Ref AppInstance
          Port: !Ref AppPort
      HealthCheckEnabled: true
      HealthCheckPath: /api/summary
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ProjectName}-${EnvironmentName}-alb"
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      LoadBalancerAttributes:
        - Key: routing.http2.enabled
          Value: true
        - Key: idle_timeout.timeout_seconds
          Value: "60"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${EnvironmentName}-alb"

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ProjectName}-${EnvironmentName}-http-api"
      ProtocolType: HTTP
      DisableExecuteApiEndpoint: false

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      Description: Proxy Antrocare traffic to the application load balancer
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      IntegrationUri: !Sub "http://${ApplicationLoadBalancer.DNSName}"
      PayloadFormatVersion: "1.0"
      TimeoutInMillis: 30000

  HttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

Outputs:
  ApiGatewayUrl:
    Description: HTTPS API Gateway URL for global access
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
  LoadBalancerUrl:
    Description: Direct HTTP load balancer URL
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"
  DatabaseEndpoint:
    Description: Private PostgreSQL endpoint inside the VPC
    Value: !GetAtt Database.Endpoint.Address
  CloudWatchLogGroup:
    Description: Application log group
    Value: !Ref AppLogGroup
  AppInstanceId:
    Description: EC2 instance running Antrocare
    Value: !Ref AppInstance
