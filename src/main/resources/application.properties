spring.application.name=antrocare-app
server.address=0.0.0.0
server.port=${PORT:8081}
antrocare.admin-key=${ANTROCARE_ADMIN_KEY:admin123}
antrocare.admin-email=${ANTROCARE_ADMIN_EMAIL:sandeepkumar.parangi0305@gmail.com}
antrocare.low-stock-threshold=${ANTROCARE_LOW_STOCK_THRESHOLD:5}
antrocare.mail-alerts-enabled=${ANTROCARE_MAIL_ALERTS_ENABLED:false}
antrocare.ses-alerts-enabled=${ANTROCARE_SES_ALERTS_ENABLED:false}
antrocare.aws-region=${AWS_REGION:us-east-1}

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:true}

spring.datasource.url=jdbc:h2:mem:antrocare;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

spring.web.resources.cache.period=${STATIC_CACHE_PERIOD:0}
