spring.application.name=antrocare-app
server.address=0.0.0.0
server.port=${PORT:8081}
server.forward-headers-strategy=framework

antrocare.admin-key=${ANTROCARE_ADMIN_KEY}
antrocare.admin-email=${ANTROCARE_ADMIN_EMAIL:sandeepkumarparangi97@gmail.com}
antrocare.low-stock-threshold=${ANTROCARE_LOW_STOCK_THRESHOLD:5}
antrocare.mail-alerts-enabled=${ANTROCARE_MAIL_ALERTS_ENABLED:false}

spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.h2.console.enabled=false

spring.web.resources.cache.period=${STATIC_CACHE_PERIOD:86400}
