services:
  - type: web
    name: antrocare-enterprises
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/summary
    envVars:
      - key: ANTROCARE_ADMIN_KEY
        sync: false
      - key: ANTROCARE_FRONTEND_URL
        value: https://antrocare-enterprises.onrender.com
      - key: ANTROCARE_ALLOWED_ORIGINS
        value: https://antrocare-enterprises.onrender.com
      - key: ANTROCARE_OAUTH2_ENABLED
        value: "true"
      - key: ANTROCARE_OAUTH2_PROVIDERS
        value: google
      - key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
        sync: false
      - key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
        sync: false
      - key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI
        value: "{baseUrl}/login/oauth2/code/{registrationId}"
      - key: H2_CONSOLE_ENABLED
        value: "false"
      - key: STATIC_CACHE_PERIOD
        value: "3600"
